# ==========================================================================
# Databricks Asset Bundle Configuration (Azure Serverless)
# ==========================================================================
# Deploy: databricks bundle deploy -t dev
# Run:    databricks bundle run -t dev daily_ingestion
# ==========================================================================

bundle:
  name: chi311-intelligence-platform

# ==========================================================================
# Workspace Configuration
# ==========================================================================

workspace:
  host: https://adb-4187832108147597.17.azuredatabricks.net

# ==========================================================================
# Variables
# ==========================================================================

variables:
  databricks_host:
    description: "Azure Databricks Workspace URL"
    default: "https://adb-4187832108147597.17.azuredatabricks.net"

# ==========================================================================
# Targets (Environments)
# ==========================================================================

targets:
  # ========================================================================
  # Development
  # ========================================================================
  dev:
    mode: development
    default: true
    
    resources:
      jobs:
        # Daily data ingestion
        daily_ingestion:
          name: "[DEV] Chi311 Daily Ingestion"

          email_notifications:
            on_success:
              - ujoshi@captechconsulting.com
            on_failure:
              - ujoshi@captechconsulting.com
            no_alert_for_skipped_runs: false

          job_clusters:
            - job_cluster_key: main
              new_cluster:
                spark_version: "15.4.x-scala2.12"
                node_type_id: "Standard_DS3_v2"
                num_workers: 0
                # SINGLE_USER access mode is required to read/write Unity Catalog
                # Volumes. Without it, all /Volumes operations fail (dbutils.fs:
                # "No Unity API token"; native open(): "Operation not permitted").
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_conf:
                  spark.databricks.cluster.profile: singleNode
                  spark.master: "local[*]"
                custom_tags:
                  ResourceClass: SingleNode
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  spot_bid_max_price: -1
          tasks:
            - task_key: api_to_volume
              job_cluster_key: main
              notebook_task:
                notebook_path: notebooks/02_ingestion/01_api_to_volume.py
            
            - task_key: bronze_autoloader
              depends_on:
                - task_key: api_to_volume
              job_cluster_key: main
              notebook_task:
                notebook_path: notebooks/02_ingestion/02_bronze_autoloader.py

          schedule:
            quartz_cron_expression: "0 0 6 * * ?" # 6AM daily
            timezone_id: "America/Chicago"
            pause_status: PAUSED # Paused in dev
        
        # Data quality checks
        data_quality:
          name: "[DEV] Chi311 Data Quality"

          email_notifications:
            on_success:
              - ujoshi@captechconsulting.com
            on_failure:
              - ujoshi@captechconsulting.com
            no_alert_for_skipped_runs: false

          job_clusters:
            - job_cluster_key: main
              new_cluster:
                spark_version: "15.4.x-scala2.12"
                node_type_id: "Standard_DS3_v2"
                num_workers: 0
                # SINGLE_USER access mode is required to read/write Unity Catalog
                # Volumes. Without it, all /Volumes operations fail (dbutils.fs:
                # "No Unity API token"; native open(): "Operation not permitted").
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_conf:
                  spark.databricks.cluster.profile: singleNode
                  spark.master: "local[*]"
                custom_tags:
                  ResourceClass: SingleNode
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  spot_bid_max_price: -1
          tasks:
            - task_key: run_dq_checks
              job_cluster_key: main
              notebook_task:
                notebook_path: notebooks/03_data_quality/01_data_quality_checks.py
        
        # ML training pipeline
        ml_training:
          email_notifications:
            on_success:
              - ujoshi@captechconsulting.com
            on_failure:
              - ujoshi@captechconsulting.com
            no_alert_for_skipped_runs: false

          name: "[DEV] Chi311 ML Training"
          job_clusters:
            - job_cluster_key: main
              new_cluster:
                spark_version: "15.4.x-scala2.12"
                node_type_id: "Standard_DS3_v2"
                num_workers: 0
                # SINGLE_USER access mode is required to read/write Unity Catalog
                # Volumes. Without it, all /Volumes operations fail (dbutils.fs:
                # "No Unity API token"; native open(): "Operation not permitted").
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_conf:
                  spark.databricks.cluster.profile: singleNode
                  spark.master: "local[*]"
                custom_tags:
                  ResourceClass: SingleNode
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  spot_bid_max_price: -1
          tasks:
            - task_key: forecasting
              job_cluster_key: main
              notebook_task:
                notebook_path: notebooks/04_ml/01_forecasting.py

            - task_key: anomaly_detection
              depends_on:
                - task_key: forecasting
              job_cluster_key: main
              notebook_task:
                notebook_path: notebooks/04_ml/02_anomaly_detection.py

          schedule:
            quartz_cron_expression: "0 0 8 ? * MON" # Monday 8AM
            timezone_id: "America/Chicago"
            pause_status: PAUSED

      # Lakeflow pipeline
      pipelines:
        chi311_dlt_pipeline:
          name: "[DEV] Chi311 Lakeflow Pipeline"
          catalog: chi311
          target: silver
          development: true

          notifications:
            - email_recipients:
                - ujoshi@captechconsulting.com
              alerts:
                - on-update-success
                - on-update-failure
                - on-flow-failure
          clusters:
            - label: default
              num_workers: 1
              node_type_id: "Standard_DS3_v2"
              azure_attributes:
                availability: SPOT_WITH_FALLBACK_AZURE
                spot_bid_max_price: -1
          libraries:
            - file:
                path: pipelines/chi311_scd2_pipeline.sql
  
  # ========================================================================
  # Production
  # ========================================================================
  prod:
    mode: production

    resources:
      jobs:
        # Daily data ingestion (serverless)
        daily_ingestion:
          name: "[PROD] Chi311 Daily Ingestion"

          email_notifications:
            on_success:
              - ujoshi@captechconsulting.com
            on_failure:
              - ujoshi@captechconsulting.com
            no_alert_for_skipped_runs: false

          tasks:
            - task_key: api_to_volume
              notebook_task:
                notebook_path: notebooks/02_ingestion/01_api_to_volume.py

            - task_key: bronze_autoloader
              depends_on:
                - task_key: api_to_volume
              notebook_task:
                notebook_path: notebooks/02_ingestion/02_bronze_autoloader.py
          
          schedule:
            quartz_cron_expression: "0 0 6 * * ?"
            timezone_id: "America/Chicago"
            pause_status: UNPAUSED

      # Lakeflow pipeline
      pipelines:
        chi311_dlt_pipeline:
          name: "[PROD] Chi311 Lakeflow Pipeline"
          catalog: chi311
          target: silver
          development: false
          clusters:
            - label: default
              num_workers: 2
              node_type_id: "Standard_DS3_v2"
          libraries:
            - file:
                path: pipelines/chi311_scd2_pipeline.sql
